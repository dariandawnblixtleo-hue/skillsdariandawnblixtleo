# Curated catalog of Blockscout direct_api_call endpoints that have NO swagger
# source and are therefore absent from the files produced by api-file-generator.py.
# This file is the source of truth for api-extras-applier.py.
#
# Originally snapshotted from the `direct_api_endpoints` field of the live
# unlock_blockchain_analysis MCP response (server version 0.15.0). It has since
# been pruned to only the endpoints with no swagger source: every entry that the
# swagger now documents — directly, or via a parameterized path that subsumes it
# (e.g. /v2/arbitrum/messages/{direction}, /v2/celo/.../election-rewards/{type}) —
# was removed, because api-extras-applier.py deduplicates those against the
# generated index anyway and they only created duplicate output entries.
#
# This is therefore no longer a verbatim mirror of the MCP response; it is a
# maintained set of swagger-less endpoints. See api-extras-applier-spec.md.

common: []

specific:
  - chain_family: zkSync
    endpoints:
      - path: /api/v2/main-page/zksync/batches/latest-number
        description: Get the latest committed batch number for zkSync.
      - path: /api/v2/zksync/batches/{batch_number}
        description: Get information for a specific zkSync batch.
  - chain_family: Shibarium
    endpoints:
      - path: /api/v2/shibarium/deposits
        description: Get L1 to L2 messages (deposits) for Shibarium.
      - path: /api/v2/shibarium/withdrawals
        description: Get L2 to L1 messages (withdrawals) for Shibarium.
  - chain_family: Stability
    endpoints:
      - path: /api/v2/validators/stability
        description: Get the list of validators for Stability.
